name: Python CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4 # Zaktualizowano v3 -> v4
    
    - name: Set up Python
      uses: actions/setup-python@v5 # Zaktualizowano v4 -> v5
      with:
        python-version: 3.9
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 coverage
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics > flake8_report.txt
    
    - name: Run tests with coverage
      run: |
        coverage run --source=. manage.py test
        coverage report -m > coverage_report.txt
        coverage html
    
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          flake8_report.txt
          coverage_report.txt
          htmlcov/
          
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:                  # <-- DODAJ TĘ LINIĘ
      security-events: write      # <-- DODAJ TĘ LINIĘ
      contents: read            
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Zaktualizowano v3 -> v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1 # Zaktualizowano v1 -> v3

    - name: Login to DockerHub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3 # Zaktualizowano v2 -> v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      uses: docker/build-push-action@v5 # Zaktualizowano v3 -> v5
      with:
        context: .
        push: false
        tags: the-button:${{ github.sha }}
        load: true
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'the-button:${{ github.sha }}'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'
        timeout: '5m'
        
    - name: Run Trivy vulnerability scanner (blocking)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'the-button:${{ github.sha }}'
        format: 'table'
        exit-code: '1'  # Zmiana z '0' na '1' - zatrzyma workflow przy wykryciu podatności
        ignore-unfixed: true
        severity: 'CRITICAL'  # Tylko krytyczne podatności będą blokować pipeline
        timeout: '5m'
        
    - name: Run Trivy vulnerability scanner (JSON report)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'the-button:${{ github.sha }}'
        format: 'json'
        output: 'trivy-results.json'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy scan results
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: trivy-results.json
    
    - name: Generate Trivy SARIF report
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'the-button:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()  # Wykonaj nawet jeśli poprzednie kroki się nie powiodły
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Test Docker image
      run: |
        docker run --name test-container -d -p 8000:8000 the-button:${{ github.sha }}
        # Próbujemy połączyć się z aplikacją 10 razy, co sekundę
        for i in {1..10}; do
          if curl -s http://localhost:8000/ | grep -q "Ping"; then
            echo "Application available!"
            break
          fi
          if [ $i -eq 10 ]; then
            echo "Application test timed out"
            exit 1
          fi
          echo "Retry $i – Waiting 1 sec..."
          sleep 1
        done

    - name: Tag and push Docker image
      if: github.event_name != 'pull_request'
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        docker tag the-button:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/the-button:${SHORT_SHA}
        docker tag the-button:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/the-button:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/the-button:${SHORT_SHA}
        docker push ${{ secrets.DOCKER_USERNAME }}/the-button:latest